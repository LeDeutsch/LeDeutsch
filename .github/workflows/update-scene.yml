name: Update Guild Scene

on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: update-scene
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate scene
        env:
          GITHUB_USER: LeDeutsch
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_scene.py

      - name: Commit if changed
        run: |
          git config user.name "guild-bot"
          git config user.email "guild-bot@users.noreply.github.com"
          git add output/ README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(scene): refresh guild hall [skip ci]"
            git push
          fi
